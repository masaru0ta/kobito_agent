<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kobito_agent</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- サイドバー -->
<aside class="sidebar">
  <div class="sidebar-logo">kobito_agent</div>

  <div class="sidebar-section-title">エージェント</div>
  <ul class="agent-list" id="agent-list"></ul>

  <div class="sidebar-section-title">会話履歴</div>
  <ul class="conversation-list" id="conversation-list"></ul>
</aside>

<!-- メインエリア -->
<main class="main">
  <div class="chat-header">
    <div>
      <div class="chat-header-name" id="header-name"></div>
      <div class="chat-header-model" id="header-model"></div>
    </div>
    <button class="btn" id="btn-new-conversation">新規会話</button>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-area">
    <div class="chat-input-wrapper">
      <textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1" disabled></textarea>
      <button class="btn-send" id="btn-send" disabled>送信</button>
    </div>
    <div class="input-hint">Enter で送信 / Shift+Enter で改行</div>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
